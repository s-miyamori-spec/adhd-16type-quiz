<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADHD 16タイプ診断</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --accent: #FF6B6B;
  --accent2: #FECA57;
  --accent3: #48DBFB;
  --accent4: #10B981;
  --bg: #0F0E17;
  --bg-card: #1A1932;
  --bg-card2: #232145;
  --text: #FFFFFE;
  --text-sub: #A7A9BE;
  --gradient1: linear-gradient(135deg, #6C5CE7, #A29BFE);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}

.bg-orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 12s ease-in-out infinite; }
.orb:nth-child(1) { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
.orb:nth-child(2) { width: 350px; height: 350px; background: var(--accent); bottom: -50px; right: -50px; animation-delay: -4s; }
.orb:nth-child(3) { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 60%; animation-delay: -8s; }

@keyframes float {
  0%, 100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-30px) scale(1.05); }
  66% { transform: translate(-20px,20px) scale(0.95); }
}

.container {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto; padding: 24px 20px;
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
}

/* LANDING */
#landing { text-align: center; }
.landing-badge {
  display: inline-block; padding: 6px 18px; border-radius: 20px;
  background: rgba(108,92,231,0.2); border: 1px solid rgba(108,92,231,0.4);
  font-size: 12px; font-weight: 500; letter-spacing: 1px; color: var(--primary-light);
  margin-bottom: 24px; text-transform: uppercase;
}
.landing-title {
  font-size: 42px; font-weight: 900; line-height: 1.2; margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 30%, var(--primary-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.landing-sub { font-size: 18px; color: var(--text-sub); margin-bottom: 12px; font-weight: 300; }
.landing-desc { font-size: 14px; color: var(--text-sub); line-height: 1.7; margin-bottom: 36px; opacity: 0.7; }
.landing-axes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; text-align: left; }
.axis-card {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; padding: 16px; position: relative; overflow: hidden;
}
.axis-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
.axis-card:nth-child(1)::before { background: linear-gradient(135deg, #6C5CE7, #A29BFE); }
.axis-card:nth-child(2)::before { background: linear-gradient(135deg, #FF6B6B, #FECA57); }
.axis-card:nth-child(3)::before { background: linear-gradient(135deg, #48DBFB, #6C5CE7); }
.axis-card:nth-child(4)::before { background: linear-gradient(135deg, #10B981, #6EE7B7); }
.axis-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.axis-card:nth-child(1) .axis-label { color: var(--primary-light); }
.axis-card:nth-child(2) .axis-label { color: var(--accent); }
.axis-card:nth-child(3) .axis-label { color: var(--accent3); }
.axis-card:nth-child(4) .axis-label { color: var(--accent4); }
.axis-poles { font-size: 13px; color: var(--text-sub); }

.btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 48px; border: none; border-radius: 60px;
  background: var(--gradient1); color: white;
  font-size: 18px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 32px rgba(108,92,231,0.4);
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(108,92,231,0.5); }

/* QUIZ */
#quiz { display: none; }
.progress-wrap { margin-bottom: 32px; }
.progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-num { font-size: 14px; font-weight: 600; color: var(--primary-light); }
.progress-bar-bg { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); background: var(--gradient1); }

.question-card {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px; padding: 36px 32px; margin-bottom: 24px;
  animation: slideUp 0.4s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.q-text { font-size: 20px; font-weight: 600; line-height: 1.6; margin-bottom: 32px; text-align: center; }

/* 5-level scale */
.q-scale-wrap { padding: 0 8px; }
.q-scale-labels {
  display: flex; justify-content: space-between; margin-bottom: 8px;
}
.q-scale-label-left, .q-scale-label-right {
  font-size: 12px; color: var(--text-sub); max-width: 120px;
}
.q-scale-label-left { text-align: left; }
.q-scale-label-right { text-align: right; }

.q-scale-buttons {
  display: flex; justify-content: center; gap: 12px; margin-bottom: 8px;
}
.q-scale-btn {
  width: 56px; height: 56px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.12);
  background: transparent; color: var(--text-sub); font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.q-scale-btn:hover { border-color: rgba(108,92,231,0.5); background: rgba(108,92,231,0.08); }
.q-scale-btn.selected { border-color: var(--primary); background: rgba(108,92,231,0.2); color: var(--text); }
.q-scale-btn.selected.s0 { border-color: #6C5CE7; background: rgba(108,92,231,0.25); }
.q-scale-btn.selected.s1 { border-color: #8B7CF6; background: rgba(139,124,246,0.2); }
.q-scale-btn.selected.s2 { border-color: #9CA3AF; background: rgba(156,163,175,0.15); }
.q-scale-btn.selected.s3 { border-color: #F472B6; background: rgba(244,114,182,0.2); }
.q-scale-btn.selected.s4 { border-color: #EC4899; background: rgba(236,72,153,0.25); }

.q-scale-hint {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-sub); opacity: 0.5; padding: 0 6px;
}

.q-nav { display: flex; justify-content: space-between; align-items: center; }
.btn-nav {
  padding: 12px 28px; border: none; border-radius: 40px;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.btn-prev { background: rgba(255,255,255,0.06); color: var(--text-sub); }
.btn-prev:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.btn-prev:disabled { opacity: 0.3; cursor: default; }
.btn-next { background: var(--gradient1); color: white; box-shadow: 0 4px 16px rgba(108,92,231,0.3); }
.btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,92,231,0.4); }
.btn-next:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

/* RESULT */
#result { display: none; text-align: center; }
.result-reveal { animation: fadeScale 0.8s ease; }
@keyframes fadeScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

.result-type-code {
  display: inline-block; padding: 8px 24px; border-radius: 12px;
  background: rgba(108,92,231,0.2); border: 1px solid rgba(108,92,231,0.3);
  font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--primary-light);
  margin-bottom: 16px; font-family: 'Inter', monospace;
}
.result-name {
  font-size: 36px; font-weight: 900; margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, var(--primary-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.result-tagline { font-size: 16px; color: var(--text-sub); margin-bottom: 32px; font-weight: 300; }

.adhd-score-section { margin-bottom: 32px; }
.adhd-score-card {
  background: var(--bg-card); border-radius: 20px; padding: 28px;
  border: 1px solid rgba(255,255,255,0.06);
}
.adhd-score-label { font-size: 13px; font-weight: 600; color: var(--text-sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.adhd-score-num { font-size: 56px; font-weight: 900; font-family: 'Inter', sans-serif; margin-bottom: 4px; line-height: 1; }
.adhd-score-sub { font-size: 13px; margin-bottom: 16px; font-weight: 600; }
.adhd-bar-outer { height: 12px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
.adhd-bar-inner { height: 100%; border-radius: 6px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s; }
.adhd-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); margin-top: 6px; opacity: 0.7; }

.adhd-axis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.adhd-axis-item {
  background: var(--bg-card2); border-radius: 14px; padding: 14px;
  border: 1px solid rgba(255,255,255,0.04);
}
.adhd-axis-name { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; }
.adhd-axis-score { font-size: 28px; font-weight: 900; font-family: 'Inter', sans-serif; line-height: 1; margin-bottom: 2px; }
.adhd-axis-which { font-size: 11px; color: var(--text-sub); margin-bottom: 8px; }
.adhd-axis-bar-bg { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.adhd-axis-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease 0.6s; }

.result-axes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; text-align: left; }
.result-axis-card { background: var(--bg-card); border-radius: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.06); }
.result-axis-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.result-axis-bar-bg {
  height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px;
  overflow: hidden; margin-bottom: 6px; position: relative;
}
.result-axis-bar-bg::after {
  content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%;
  background: rgba(255,255,255,0.15); transform: translateX(-50%);
}
.result-axis-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease 0.5s; }
.result-axis-poles { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); }

.result-detail-card {
  background: var(--bg-card); border-radius: 20px; padding: 28px;
  border: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px; text-align: left;
}
.result-detail-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.result-detail-text { font-size: 14px; color: var(--text-sub); line-height: 1.8; }
.result-detail-list { list-style: none; padding: 0; }
.result-detail-list li {
  padding: 6px 0; font-size: 14px; color: var(--text-sub);
  display: flex; align-items: flex-start; gap: 8px;
}
.result-detail-list li::before { content: '→'; color: var(--primary-light); flex-shrink: 0; margin-top: 1px; }

.celeb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.celeb-item { background: var(--bg-card2); border-radius: 14px; padding: 14px; border: 1px solid rgba(255,255,255,0.04); }
.celeb-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.celeb-reason { font-size: 12px; color: var(--text-sub); line-height: 1.5; }

.compat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.compat-item { background: var(--bg-card2); border-radius: 14px; padding: 14px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
.compat-emoji { font-size: 28px; margin-bottom: 6px; }
.compat-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.compat-code { font-size: 11px; color: var(--text-sub); font-family: 'Inter', monospace; }
.compat-label {
  display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 6px; margin-bottom: 8px; letter-spacing: 0.5px;
}
.compat-good .compat-label { background: rgba(72,219,251,0.15); color: var(--accent3); }
.compat-bad .compat-label { background: rgba(255,107,107,0.15); color: var(--accent); }

.advice-list { list-style: none; padding: 0; }
.advice-list li {
  padding: 10px 0; font-size: 14px; color: var(--text-sub); line-height: 1.7;
  display: flex; align-items: flex-start; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.advice-list li:last-child { border-bottom: none; }
.advice-num {
  flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
  background: rgba(108,92,231,0.2); color: var(--primary-light);
  font-size: 12px; font-weight: 700; display: flex; align-items: center;
  justify-content: center; margin-top: 2px;
}

.keyword-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 28px; }
.keyword-tag {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: rgba(108,92,231,0.12); color: var(--primary-light);
  border: 1px solid rgba(108,92,231,0.2);
}

.btn-retry {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 36px; border: 2px solid rgba(255,255,255,0.15); border-radius: 40px;
  background: transparent; color: var(--text); font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all 0.2s; margin-top: 24px;
}
.btn-retry:hover { border-color: var(--primary); background: rgba(108,92,231,0.1); }

.result-emoji { font-size: 64px; margin-bottom: 16px; }
.section-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 8px 0 24px; }

@media (max-width: 600px) {
  .container { padding: 16px; }
  .landing-title { font-size: 30px; }
  .landing-axes { grid-template-columns: 1fr; }
  .result-axes-grid { grid-template-columns: 1fr; }
  .celeb-grid { grid-template-columns: 1fr; }
  .compat-grid { grid-template-columns: 1fr; }
  .question-card { padding: 24px 20px; }
  .q-text { font-size: 17px; }
  .result-name { font-size: 28px; }
  .adhd-score-num { font-size: 44px; }
  .q-scale-btn { width: 48px; height: 48px; font-size: 14px; }
  .q-scale-buttons { gap: 8px; }
}
</style>
</head>
<body>

<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="container">

  <!-- LANDING -->
  <div id="landing">
    <div class="landing-badge">Personality Quiz</div>
    <h1 class="landing-title">ADHD 16タイプ診断</h1>
    <p class="landing-sub">あなたの脳のクセ、16タイプで読み解く</p>
    <p class="landing-desc">4つの軸 × 20の質問で、あなたのADHD傾向をタイプ分類します。<br>正解はありません。直感で答えてください。</p>
    <div class="landing-axes">
      <div class="axis-card">
        <div class="axis-label">軸1 — 多動</div>
        <div class="axis-poles">身体多動 ⇔ 思考多動</div>
      </div>
      <div class="axis-card">
        <div class="axis-label">軸2 — 注意</div>
        <div class="axis-poles">過集中 ⇔ 散漫</div>
      </div>
      <div class="axis-card">
        <div class="axis-label">軸3 — エンジン</div>
        <div class="axis-poles">興味ドリブン ⇔ 締切ドリブン</div>
      </div>
      <div class="axis-card">
        <div class="axis-label">軸4 — 社会性</div>
        <div class="axis-poles">共感型 ⇔ マイペース型</div>
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">
      診断スタート
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-num" id="progressNum">Q1 / 20</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width:5%"></div>
      </div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="q-text" id="qText"></div>
      <div class="q-scale-wrap">
        <div class="q-scale-labels">
          <span class="q-scale-label-left" id="labelLeft"></span>
          <span class="q-scale-label-right" id="labelRight"></span>
        </div>
        <div class="q-scale-buttons" id="scaleButtons"></div>
        <div class="q-scale-hint">
          <span>とても当てはまる</span>
          <span>どちらでもない</span>
          <span>とても当てはまる</span>
        </div>
      </div>
    </div>
    <div class="q-nav">
      <button class="btn-nav btn-prev" id="btnPrev" onclick="prevQ()" disabled>← 戻る</button>
      <button class="btn-nav btn-next" id="btnNext" onclick="nextQ()" disabled>次へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

<script>
// ===== QUESTIONS =====
// Each question has: text (question), axis (0-3), leftLabel, rightLabel
// Score: button 0 = +2 (left pole), 1 = +1, 2 = 0, 3 = -1, 4 = -2 (right pole)
// axis 0: B(+) vs M(-), axis 1: H(+) vs S(-), axis 2: I(+) vs D(-), axis 3: E(+) vs P(-)

const questionsOriginal = [
  // AXIS 0: 多動 — 身体(B) vs 思考(M) — 5問（シナリオ型）
  { text: "カフェで友達を待っている。15分遅れるとLINEが来た。あなたは…",
    axis: 0, leftLabel: "店の外を歩き回る", rightLabel: "スマホで調べ物の沼に落ちる" },
  { text: "日曜の午後、特に予定がない。ふと気づくと自分は…",
    axis: 0, leftLabel: "部屋の模様替えや散歩をしている", rightLabel: "Wikiの連鎖リンクを3時間読んでいる" },
  { text: "つまらない映画を見ている途中、自分に起きていること",
    axis: 0, leftLabel: "ポップコーンを食べたり姿勢を変えまくる", rightLabel: "映画と全然関係ない空想をしている" },
  { text: "長い電話会議で自分がミュートのとき、無意識にやっていること",
    axis: 0, leftLabel: "ペン回し・貧乏ゆすり・立ち歩き", rightLabel: "別の企画のアイデアを考え始める" },
  { text: "引っ越し作業中、友達があなたについて言いそうなこと",
    axis: 0, leftLabel: "「動きすぎ。落ち着いて」", rightLabel: "「手が止まってるけど、何考えてるの？」" },

  // AXIS 1: 注意 — 過集中(H) vs 散漫(S) — 5問（シナリオ型）
  { text: "気になるYouTube動画を見つけた。3時間後のあなた",
    axis: 1, leftLabel: "同じチャンネルの動画を全部見ている", rightLabel: "10本の動画を2分ずつ見て何も覚えていない" },
  { text: "仕事中にSlackの通知が鳴った。あなたの反応は",
    axis: 1, leftLabel: "気づかない。集中が途切れるのは30分後", rightLabel: "即座に開いて、そのまま別の話題に流される" },
  { text: "料理中にタイマーが鳴った。あなたにありがちなのは",
    axis: 1, leftLabel: "レシピの改良に夢中で、タイマーも聞こえない", rightLabel: "別のことを始めてて、鍋の存在を忘れている" },
  { text: "本屋に行った。帰る時にカバンに入っているのは",
    axis: 1, leftLabel: "一つのジャンルの本が5冊", rightLabel: "バラバラのジャンルの本が5冊" },
  { text: "友人が「昨日何してた？」と聞いてきた。あなたの答え",
    axis: 1, leftLabel: "「気づいたら深夜3時まで〇〇してた」", rightLabel: "「色々やってたけど…何も終わってないかも」" },

  // AXIS 2: エンジン — 興味(I) vs 締切(D) — 5問（シナリオ型）
  { text: "夏休みの宿題。あなたのパターンに近いのは",
    axis: 2, leftLabel: "好きな自由研究だけ初日に終わらせた", rightLabel: "8月31日に全教科まとめてやった" },

// ===== FUNCTIONS =====
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  shuffleMap = shuffleArray(Array.from({length: 20}, (_, i) => i));
  questions = shuffleMap.map(i => questionsOriginal[i]);
  answers = new Array(20).fill(null);
  document.getElementById('landing').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion(0);
}

function showQuestion(idx) {
  currentQ = idx;
  const q = questions[idx];

  document.getElementById('progressNum').textContent = `Q${idx + 1} / 20`;
  document.getElementById('progressBar').style.width = `${((idx + 1) / 20) * 100}%`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('labelLeft').textContent = q.leftLabel;
  document.getElementById('labelRight').textContent = q.rightLabel;

  const container = document.getElementById('scaleButtons');
  container.innerHTML = '';
  const labels = ['1', '2', '3', '4', '5'];
  for (let i = 0; i < 5; i++) {
    const btn = document.createElement('button');
    btn.className = 'q-scale-btn' + (answers[idx] === i ? ` selected s${i}` : '');
    btn.textContent = labels[i];
    btn.onclick = () => selectScale(idx, i);
    container.appendChild(btn);
  }

  document.getElementById('btnPrev').disabled = idx === 0;
  updateNextBtn();

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s ease';
}

function selectScale(qi, val) {
  answers[qi] = val;
  const btns = document.querySelectorAll('.q-scale-btn');
  btns.forEach((b, i) => {
    b.className = 'q-scale-btn' + (i === val ? ` selected s${i}` : '');
  });
  updateNextBtn();
  setTimeout(() => { if (currentQ < 19) nextQ(); }, 400);
}

function updateNextBtn() {
  const btn = document.getElementById('btnNext');
  btn.disabled = answers[currentQ] === null;
  btn.textContent = currentQ === 19 ? '結果を見る →' : '次へ →';
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < 19) showQuestion(currentQ + 1);
  else showResult();
}

function prevQ() {
  if (currentQ > 0) showQuestion(currentQ - 1);
}

function showResult() {
  let scores = [0, 0, 0, 0];
  for (let i = 0; i < 20; i++) {
    const q = questions[i];
    const value = 2 - answers[i]; // +2, +1, 0, -1, -2
    scores[q.axis] += value;
  }

  const code =
    (scores[0] >= 0 ? 'B' : 'M') +
    (scores[1] >= 0 ? 'H' : 'S') +
    (scores[2] >= 0 ? 'I' : 'D') +
    (scores[3] >= 0 ? 'E' : 'P');

  const t = typeData[code];
  const maxScore = 10; // 5 questions × 2 max per question

  // Gauge: left pole = positive score → bar should be on LEFT (low %)
  // right pole = negative score → bar should be on RIGHT (high %)
  const pcts = scores.map(s => Math.round(50 - (s / maxScore) * 50));

  // Per-axis ADHD intensity (how extreme = how far from center)
  const axisIntensity = scores.map(s => Math.round((Math.abs(s) / maxScore) * 100));

  // Overall ADHD score = average of per-axis intensities
  const adhdScore = Math.round(axisIntensity.reduce((a, b) => a + b, 0) / 4);

  let adhdLevel, adhdColor;

  else if (adhdScore < 50) { adhdLevel = 'ちょいクセ脳'; adhdColor = '#FECA57'; }

          <div class="adhd-bar-outer">

      </div>

      <button class="btn-retry" onclick="retry()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        もう一度診断する
      </button>
    </div>
  `;

  setTimeout(() => {
    document.querySelectorAll('.result-axis-bar-fill').forEach(bar => { bar.style.width = bar.dataset.width; });
    document.querySelectorAll('.adhd-bar-inner').forEach(bar => { bar.style.width = bar.dataset.width; });
    document.querySelectorAll('.adhd-axis-bar-fill').forEach(bar => { bar.style.width = bar.dataset.width; });
  }, 100);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retry() {
  answers = new Array(20).fill(null);
  currentQ = 0;
  document.getElementById('result').style.display = 'none';
  document.getElementById('landing').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
